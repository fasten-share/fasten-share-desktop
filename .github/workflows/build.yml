name: Build Desktop

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      client_ref:
        description: "fasten-share-client branch, tag, or commit to package"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            release_id=$(gh api "repos/$GH_REPO/releases/tags/$GITHUB_REF_NAME" --jq .id)
            gh api --method PATCH "repos/$GH_REPO/releases/$release_id" -F draft=true
          else
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --verify-tag \
              --title "Fasten Share $GITHUB_REF_NAME" \
              --generate-notes
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            package_script: dist:win
            artifact_name: fasten-share-desktop-windows
            artifact_paths: |
              fasten-share-desktop/release/*.exe
              fasten-share-desktop/release/*.blockmap
              fasten-share-desktop/release/latest*.yml
          - name: macOS
            os: macos-15-intel
            package_script: dist:mac
            artifact_name: fasten-share-desktop-macos
            artifact_paths: |
              fasten-share-desktop/release/*.dmg
              fasten-share-desktop/release/*.zip
              fasten-share-desktop/release/*.blockmap
              fasten-share-desktop/release/latest*.yml
          - name: Linux
            os: ubuntu-latest
            package_script: dist:linux
            artifact_name: fasten-share-desktop-linux
            artifact_paths: |
              fasten-share-desktop/release/*.AppImage
              fasten-share-desktop/release/*.deb
              fasten-share-desktop/release/*.blockmap
              fasten-share-desktop/release/latest*.yml

    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout desktop
        uses: actions/checkout@v7
        with:
          path: fasten-share-desktop
          persist-credentials: false

      - name: Checkout client
        uses: actions/checkout@v7
        with:
          repository: fasten-share/fasten-share-client
          ref: ${{ inputs.client_ref || 'main' }}
          path: fasten-share-client
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            fasten-share-client/package-lock.json
            fasten-share-desktop/package-lock.json

      - name: Install client dependencies
        working-directory: fasten-share-client
        run: npm ci

      - name: Export client for desktop
        working-directory: fasten-share-client
        run: npm run export:desktop

      - name: Install desktop dependencies
        working-directory: fasten-share-desktop
        run: npm ci

      - name: Package desktop app
        working-directory: fasten-share-desktop
        run: npm run ${{ matrix.package_script }} -- --publish never

      - name: Upload desktop artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s nullglob
          files=(
            fasten-share-desktop/release/*.exe
            fasten-share-desktop/release/*.dmg
            fasten-share-desktop/release/*.zip
            fasten-share-desktop/release/*.AppImage
            fasten-share-desktop/release/*.deb
            fasten-share-desktop/release/*.blockmap
            fasten-share-desktop/release/latest*.yml
          )
          if (( ${#files[@]} == 0 )); then
            echo "No release assets found" >&2
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          release_id=$(gh api "repos/$GH_REPO/releases/tags/$GITHUB_REF_NAME" --jq .id)
          gh api --method PATCH "repos/$GH_REPO/releases/$release_id" -F draft=false
